<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <title>Frontend Mentor | Age calculator app</title>

  <!--  Link Google Font-->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,700;1,400;1,800&display=swap" rel="stylesheet" type="text/css">

  <!--  Link stylesheet -->
  <link rel="stylesheet" href="style.css">

<!--  Link app -->
  <script src="build/app.js"></script>
</head>

<body>
  <div class="container">
    <form>
      <div class="input-day">
        <label for="day" id="day-label">DAY</label>
        <input id="day" placeholder="DD" type="number" required>
        <small class="error-message" id="message-day"></small>
      </div>
      <div class="input-month">
        <label for="month" id="month-label">MONTH</label>
        <input id="month" placeholder="MM" type="number" required>
        <small class="error-message" id="message-month"></small>
      </div>
      <div class="input-year">
        <label for="year" id="year-label">YEAR</label>
        <input id="year" placeholder="YYYY" type="number" required>
        <small class="error-message" id="message-year"></small>
      </div>
    </form>
    <button id="submit-button">
      <img src="./assets/images/icon-arrow.svg">
    </button>
    <div class="output">
      <h1><span id="year-output">- -</span> years</h1>
      <h1><span id="month-output">- -</span> months</h1>
      <h1><span id="day-output">- -</span> days</h1>
    </div>
  </div>
  <div class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a href="#">Noel Hoppe</a>.
  </div>
</body>

</html>
